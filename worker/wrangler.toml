# Cloudflare Worker config for the 30 Days English backend.
# Deploy: `wrangler deploy`. Set secrets with `wrangler secret put <NAME>` (see .dev.vars.example).
name = "thirty-days-en"
main = "src/index.ts"
compatibility_date = "2026-07-03"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Agents voice tutor — a Durable Object (SQLite-backed) that runs the
# realtime voice pipeline (Workers AI STT + LLM + TTS). No external key.
[[durable_objects.bindings]]
name = "VoiceTutor"
class_name = "VoiceTutor"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VoiceTutor"]

# Same-origin hosting: this Worker also serves the built frontend (app/dist), so
# the app and its /api routes share one origin (login cookie is not cross-site).
# Build the app first: cd ../app && npm run build (with VITE_SAME_ORIGIN=true).
# Static assets are served automatically; the Worker script handles the API paths
# (/health /me /login /logout /ai/* /speech/* /auth/* /progress). Client routing is HashRouter, so
# the SPA fallback rarely triggers, but it's set for direct deep links.
[assets]
directory = "../app/dist"
not_found_handling = "single-page-application"

# Cloudflare Workers AI — powers the 4 AI features. Free daily allocation, no key.
[ai]
binding = "AI"

# 在在 push calls — daily payload-free Web Push tickles (src/push.ts).
# 23:00 UTC = 北京 07:00 morning call to every subscriber;
# 12:00 UTC = 北京 20:00 evening rescue, only subs with stale (>14h) progress.
[triggers]
crons = ["0 23 * * *", "0 12 * * *"]

[vars]
# AI model: Cloudflare Workers AI (free daily allocation, open-source models, no
# API key). Swap to a lighter model to save "neurons" quota, e.g.
# "@cf/meta/llama-3.1-8b-instruct" (faster/cheaper) or a Qwen model for Chinese.
CF_AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
# CORS: set to your deployed frontend origin in production (e.g. https://30days.pages.dev).
# Must be the exact origin (not "*") once auth cookies are used.
ALLOWED_ORIGIN = "*"
# Cloudflare Access (Zero Trust) — OPTIONAL per-user login. Leave blank to run in
# open mode (no login; endpoints rate-limited per IP). Fill both to require login:
# team domain like "myteam.cloudflareaccess.com" + the Access app's Audience (AUD) tag.
CF_ACCESS_TEAM_DOMAIN = ""
CF_ACCESS_AUD = ""
# Azure Speech (neural TTS + phoneme pronunciation scoring) — OPTIONAL. Both the
# key AND the region are secrets so enabling it is two commands, no redeploy:
#   wrangler secret put AZURE_SPEECH_KEY       (paste KEY1 from the Azure portal)
#   wrangler secret put AZURE_SPEECH_REGION    (paste the Location, e.g. eastasia)
# Leave unset → the app uses the free system/Aura voice and the CF match-score.
# Default Azure neural voice.
AZURE_VOICE = "en-US-AvaMultilingualNeural"
# Daily AI-call quota per user.
DAILY_AI_QUOTA = "80"
# Daily Azure-speech-token mints per user (each grants ~10 min of Azure access).
DAILY_SPEECH_QUOTA = "60"
# Free-tier daily caps for non-members — only take effect once the D1 membership
# system (below) is enabled; without D1 everyone gets the full quotas as before.
FREE_AI_QUOTA = "5"
FREE_SPEECH_QUOTA = "20"
# OpenAI Realtime (voice conversation) — OPTIONAL. The key is a secret (below);
# leaving OPENAI_API_KEY unset keeps realtime OFF (endpoint 503, /health realtime:false).
OPENAI_REALTIME_MODEL = "gpt-4o-realtime-preview"
OPENAI_REALTIME_VOICE = "alloy"
# Daily realtime-session mints per user (each is an expensive OpenAI voice session).
DAILY_REALTIME_QUOTA = "20"
FREE_REALTIME_QUOTA = "2"
# xAI Grok realtime voice (native speech-to-speech). Enable with:
#   wrangler secret put XAI_API_KEY   (usage-billed by xAI)
# Voices: eve / ara / rex / sal / leo.
XAI_REALTIME_MODEL = "grok-voice-latest"
XAI_REALTIME_VOICE = "eve"
# Web Push (在在 morning call) — VAPID application-server PUBLIC key: base64url of
# the raw P-256 point (the browser's applicationServerKey). Its pair is a secret:
#   wrangler secret put VAPID_PRIVATE_KEY   (PKCS8 DER, standard base64)
# Both set + D1 bound → /health features.push:true. Rotate the two TOGETHER.
VAPID_PUBLIC_KEY = "BD6JhhPn1K2t4yC3wWJHhyyAmvp8pEVhuwAhiPT2eWUCnfS6Ekz5XO15b5GEn0_4NZyHI6geTXnxX2w11N_V1wM"

# Per-user daily quota counter. Create with:
#   wrangler kv namespace create QUOTA
# then paste the id below.
[[kv_namespaces]]
binding = "QUOTA"
id = "871eceea03fa450aa75e89833dc325ef"

# ---- Membership (Cloudflare D1) — OPTIONAL, off by default ----
# Username/password accounts + activation-code membership + cloud progress sync.
# While this block stays commented out, the Worker behaves exactly as before
# (passcode/Access/open modes) and /auth/* + /progress answer 503 会员系统未启用.
# Enable in 4 steps:
#   1. wrangler d1 create thirty-days-en-db      → copy the printed database_id
#   2. Uncomment the block below and paste the id
#   3. wrangler d1 migrations apply thirty-days-en-db --remote
#   4. wrangler secret put SESSION_SECRET        → paste a long random string
#      (generate one: openssl rand -hex 32)
# Generate activation codes (prints SQL INSERTs, nothing touches the network):
#   node scripts/gen-codes.mjs 10 365 > codes.sql
#   wrangler d1 execute thirty-days-en-db --remote --file=codes.sql
[[d1_databases]]
binding = "DB"
database_name = "thirty-days-en-db"
database_id = "90470543-208e-47aa-8890-a235b9f97a0f"

# ---- Secrets (DO NOT put real values here — use `wrangler secret put`) ----
#   AZURE_SPEECH_KEY   OPTIONAL — only for premium neural voice + pronunciation
#                      assessment. Without it, the app uses the browser voice.
#   SESSION_SECRET     OPTIONAL — HMAC key for membership session cookies; only
#                      needed once the D1 block above is enabled.
#   OPENAI_API_KEY     OPTIONAL — OpenAI key with Realtime access, for the live
#                      voice-conversation feature. Set with:
#                        wrangler secret put OPENAI_API_KEY
#                      Leaving it unset keeps realtime off (endpoint 503,
#                      /health realtime:false); everything else runs as before.
# (AI text = Workers AI binding, no key. Login = optional Cloudflare Access, no secret.)
